- name: macOS - DNS set to Cloudflare 1.1.1.1
  query: SELECT 1 FROM dns_resolvers WHERE address = '1.1.1.1' AND type = 'nameserver';
  critical: false
  description: This host's DNS may not be configured to use Cloudflare's 1.1.1.1 resolver, which provides fast and private DNS lookups.
  resolution: |
    Set your DNS to Cloudflare (1.1.1.1) via System Settings > Network > DNS, or contact IT for assistance.
  platform: darwin
  run_script:
    path: ../scripts/set-dns-cloudflare.sh
