org_settings: 
  secrets:
    - secret: "a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d"
  org_info:
    ###########################################################
    # The name of your organization is displayed to end users
    # during the setup experience for new hardware, and to admins
    # in the Fleet UI.
    # 
    # Read more:
    #   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files#org-info
    ###########################################################
    org_name: "ACME Inc"

  server_settings:
    ###########################################################
    # The server URL where Fleet is running.
    #
    #   ‚Ä¢ No trailing slash at the end
    #   ‚Ä¢ `http://` or `https://` at the beginning.
    #
    # (You can copy this from the URL bar in your browser.)
    #
    # Warning: Careful not to change this URL after enrolling
    # Apple devices with MDM pointed at Fleet. If this URL changes
    # and Apple hosts already have MDM turned on, then end users
    # will have to take action to restore MDM functionality (due
    # to the way Apple's device management protocol works.)
    ###########################################################
    server_url: $FLEET_URL #"https://fleet.example.com"
    #           ^TODO: Replace with the URL where Fleet is running.

  host_expiry_settings:
    host_expiry_enabled: true
    host_expiry_window: 30

  webhook_settings:
    activities_webhook:
      enable_activities_webhook: true
      destination_url: https://webhook.site/#!/view/a3b1f7c2-9d4e-4f8a-b6e5-1c2d3e4f5a6b

  fleet_desktop:
    transparency_url: https://omfgdogs.com

  ###########################################################
  # Uncomment to use single sign-on (SSO) for admins accessing Fleet.
