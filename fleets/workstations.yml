# # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
#
# workstations.yml
# 
# Use this fleet manifest to configure controls, software,
# automations, policies, and reports that apply only to
# computing devices (hosts) in this particular fleet.
# 
# > Note: By convention, the "üíª Workstations" fleet is
# > where all company-owned laptops, PCs, and other
# > productivity endpoints (i.e. computers) are enrolled.
#
# To see all supported options, check out:
#   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files
#
# # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
name: "üíª Workstations"
controls:
  apple_setup:
    ###########################################################
    # Configure the macOS setup experience
    # 
    # (Optional) edit the automatic enrollment profile referenced
    # here to change which items are skipped during macOS setup
    # and other aspects of the end user's experience during
    # their first few minutes with their new Mac.
    #
    # For more, see:
    #   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files#macos-setup
    #   ‚Ä¢ https://developer.apple.com/documentation/devicemanagement/profile
    #   ‚Ä¢ https://support.apple.com/guide/deployment/automated-device-enrollment-management-dep73069dd57/web
    ###########################################################
    apple_setup_assistant: ../platforms/macos/enrollment-profiles/automatic-enrollment.dep.json
    
    ###########################################################
    # Uncomment to use single-sign on (SSO) to authenticate 
    # end users during first-time setup of new computers.
    #
    # Read more:
    #   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files#end-user-authentication
    #   ‚Ä¢ https://fleetdm.com/guides/setup-experience#end-user-authentication
    ###########################################################
    # enable_end_user_authentication: true

  ###########################################################
  # Configuration profiles
  # 
  # For more, see:
  #   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files#apple-settings-and-windows-settings
  #
  # Note: Instead of including all profiles with `paths`,
  # you can also switch to using `path` and including each 
  # specific configuration profile one by one, which allows
  # for scoping using labels.  For example:
  # ```
  # - path: ../platforms/macos/configuration-profiles/1password-managed-settings.mobileconfig
  #   labels_include_any:
  #     - "Macs with 1Password installed"
  # ```
  ###########################################################
  apple_settings:
    profiles:
      # - paths: ../platforms/macos/declaration-profiles/*.json  # Glob paths not yet supported
      - path: ../platforms/macos/configuration-profiles/disable-bluetooth-file-sharing.mobileconfig
        labels_include_any:
          - "Department: Engineering"
  windows_settings:
    profiles:
      # - paths: ../platforms/windows/configuration-profiles/*.xml  # Glob paths not yet supported
  
  ###########################################################
  # Managed disk encryption
  #
  # To enable and enforce disk encryption with key escrow on
  # all supported platforms, uncomment `enable_disk_encryption`.
  #
  # Read more here:
  #   ‚Ä¢ https://fleetdm.com/guides/enforce-disk-encryption
  ###########################################################
  # enable_disk_encryption: true

  ###########################################################
  # Managed OS updates
  #
  # To enable and enforce managed OS updates on macOS/Windows,
  # uncomment `macos_updates` and `windows_updates`.
  #
  # See also:
  #   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files#macos-updates
  #   ‚Ä¢ https://fleetdm.com/docs/configuration/yaml-files#windows-updates
  #   ‚Ä¢ https://fleetdm.com/guides/enforce-os-updates
  ###########################################################
  macos_updates:
    deadline: "2026-04-30"
    minimum_version: "26.0"
    update_new_hosts: true
  # windows_updates:
  #   deadline_days: 7
  #   grace_period_days: 2

  # TODO: mike: Go add documentation links for each section below
  # (and write up the software section in here and the personal mobile devices fleet manifest)

  ###########################################################
  # Script library
  # 
  # Note: You probably don't need to change the next few lines.
  #
  # > To make a script available for use with Fleet for helpdesk
  # > use cases and in your custom automations, just include it
  # > in the appropriate folder for the primary platform where it
  # > is intended to run.  It will be included automatically
  # > using `paths` below.
  ###########################################################
  scripts:
    # - paths: ../platforms/macos/scripts/*.sh  # Glob paths not yet supported
    - path: ../platforms/macos/scripts/set-dns-cloudflare.sh
    # - paths: ../platforms/windows/scripts/*.ps1  # Glob paths not yet supported
    - path: ../platforms/windows/scripts/set-wallpaper.ps1
    # - paths: ../platforms/linux/scripts/*.sh

###########################################################
# Reports
#
# Note: You probably don't need to change the next few lines.
#
# > To set up a report in Fleet for collecting data, include
# > it as a .yml file in `platforms/all/reports/` or if it
# > is specific to a particular platform, then in the appropriate
# > folder for that platform.  It will be included automatically
# > using `paths` below.
###########################################################
reports:
  # - paths: ../platforms/all/reports/*.yml  # Glob paths not yet supported
  # - paths: ../platforms/macos/reports/*.yml  # Glob paths not yet supported
  # - paths: ../platforms/windows/reports/*.yml  # Glob paths not yet supported
  # - paths: ../platforms/linux/reports/*.yml  # Glob paths not yet supported

###########################################################
# Policies & automations
#
# Note: You probably don't need to change the next few lines.
#
# > To set up a policy in Fleet to implement automations or
# > ensure compliance with organizational security standards
# > or regulations, include it as a .yml file in the
# > appropriate folder for the primary platform where it
# > is intended to run.  It will be included automatically
# > using `paths` below.
###########################################################
policies:
  # - paths: ../platforms/macos/policies/*.yml  # Glob paths not yet supported
  - path: ../platforms/macos/policies/all-software-updates-installed.yml
  - path: ../platforms/macos/policies/dns-cloudflare.yml
  # - paths: ../platforms/windows/policies/*.yml  # Glob paths not yet supported
  # - paths: ../platforms/linux/policies/*.yml  # Glob paths not yet supported

###########################################################
# Software available for install
#
# Read more here:
#   ‚Ä¢  https://fleetdm.com/docs/configuration/yaml-files#software
###########################################################
